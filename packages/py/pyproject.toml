[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "qorechain-rdk"
version = "0.1.0"
description = "Python Rollup Development Kit for the QoreChain network (coming soon)."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "QoreChain" }]
keywords = ["qorechain", "rollup", "rdk", "blockchain"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/qorechain/qorechain-rdk"
Repository = "https://github.com/qorechain/qorechain-rdk"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
qorechain_rdk = ["py.typed"]
