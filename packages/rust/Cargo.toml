[package]
name = "qorechain-rdk"
version = "0.2.0"
edition = "2021"
license = "Apache-2.0"
description = "Rust Rollup Development Kit for the QoreChain network."
authors = ["QoreChain"]
repository = "https://github.com/qorechain/qorechain-rdk"
keywords = ["qorechain", "rollup", "rdk", "blockchain"]
categories = ["api-bindings"]

[lib]
name = "qorechain_rdk"
path = "src/lib.rs"

[dependencies]
cosmrs = { version = "0.21", features = ["bip32"] }
bip32 = { version = "0.5", default-features = false, features = ["bip39", "secp256k1", "alloc", "std"] }
prost = "0.13"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bech32 = "0.11"
sha2 = "0.10"
hmac = "0.12"
pbkdf2 = { version = "0.12", default-features = false }
hex = "0.4"
thiserror = "2"

[dev-dependencies]
k256 = { version = "0.13", features = ["ecdsa"] }
